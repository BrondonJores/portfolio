# Pipeline CI backend: lint, tests unitaires, migrations, seed et smoke test
name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'codex/**'
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d portfolio_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      APP_URL: http://127.0.0.1:5000
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: portfolio_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL: false
      DB_SSL_REJECT_UNAUTHORIZED: false
      JWT_ACCESS_SECRET: test_access_secret_long_enough
      JWT_REFRESH_SECRET: test_refresh_secret_long_enough
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ChangeMe123!
      MAIL_DELIVERY_MODE: mock
      CLOUDINARY_CLOUD_NAME: demo
      CLOUDINARY_API_KEY: demo
      CLOUDINARY_API_SECRET: demo
      SMOKE_REQUIRE_DB: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix server ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Run migrations
        run: npm --prefix server run migrate

      - name: Seed database
        run: npm --prefix server run seed

      - name: Smoke tests (strict DB)
        run: npm run test:smoke
